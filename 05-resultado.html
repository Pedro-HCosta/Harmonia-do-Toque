<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analisando — Harmonia do Toque</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: Arial, sans-serif; background: #FAF6EF; color: #3B2A1A;
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 40px 24px;
    text-align: center;
  }

  .icon {
    width: 80px; height: 80px; border-radius: 24px; background: #3B2A1A;
    display: flex; align-items: center; justify-content: center;
    font-size: 32px; margin: 0 auto 24px;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }

  h2 { font-size: 26px; margin-bottom: 8px; }
  .subtitle {
    font-size: 13px; color: #9E9688; line-height: 1.6;
    max-width: 280px; margin: 0 auto 32px;
  }

  .bar-wrap { width: 100%; max-width: 320px; margin: 0 auto 8px; }
  .bar-track { width: 100%; height: 6px; background: #F0E6D6; border-radius: 3px; overflow: hidden; }
  .bar-fill { height: 100%; background: #5C6B3A; border-radius: 3px; width: 0%; transition: width 0.5s ease; }
  .pct { font-size: 12px; color: #9E9688; text-align: right; margin-top: 4px; }

  .steps { width: 100%; max-width: 320px; margin: 28px auto 0; text-align: left; }
  .step {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 0; border-bottom: 1px solid #F0E6D6;
    font-size: 13px; color: #B8B0A6;
  }
  .step:last-child { border-bottom: none; }
  .step-icon { width: 20px; text-align: center; font-size: 14px; }
  .step.done { color: #5C6B3A; }
  .step.running { color: #3B2A1A; font-weight: bold; }
</style>
</head>
<body>

  <div class="icon">🎵</div>
  <h2>Criando sua experiência</h2>
  <div class="subtitle">A IA está analisando seu perfil e selecionando as músicas ideais para este momento.</div>

  <div class="bar-wrap">
    <div class="bar-track"><div class="bar-fill" id="bar"></div></div>
    <div class="pct" id="pct">0%</div>
  </div>

  <div class="steps">
    <div class="step" id="s1"><div class="step-icon">○</div><span>Perfil emocional mapeado</span></div>
    <div class="step" id="s2"><div class="step-icon">○</div><span>Preferências musicais analisadas</span></div>
    <div class="step" id="s3"><div class="step-icon">○</div><span>Selecionando repertório...</span></div>
    <div class="step" id="s4"><div class="step-icon">○</div><span>Ajustando BPM e tom</span></div>
  </div>

<script>
  const steps = [
    { id: 's1', pct: 25, delay: 500 },
    { id: 's2', pct: 55, delay: 1100 },
    { id: 's3', pct: 78, delay: 1800 },
    { id: 's4', pct: 100, delay: 2500 },
  ];

  steps.forEach((s, i) => {
    setTimeout(() => {
      if (i > 0) {
        const prev = document.getElementById(steps[i-1].id);
        prev.classList.remove('running');
        prev.classList.add('done');
        prev.querySelector('.step-icon').textContent = '✓';
      }
      const el = document.getElementById(s.id);
      el.classList.add('running');
      el.querySelector('.step-icon').textContent = '◌';
      document.getElementById('bar').style.width = s.pct + '%';
      document.getElementById('pct').textContent = s.pct + '%';
    }, s.delay);
  });

  setTimeout(() => {
    document.getElementById('s4').classList.remove('running');
    document.getElementById('s4').classList.add('done');
    document.getElementById('s4').querySelector('.step-icon').textContent = '✓';
    setTimeout(() => window.location.href = '06-resultado.html', 500);
  }, 3200);
</script>
</body>
</html>
