<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sessão Ativa — Harmonia do Toque</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: Arial, sans-serif; background: #1a120a; color: #F0E6D6;
    min-height: 100vh; display: flex; flex-direction: column;
  }

  .content {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 40px 28px; text-align: center; position: relative;
  }

  /* Ripple rings */
  .rings { position: relative; width: 160px; height: 160px; margin-bottom: 32px; }
  .ring {
    position: absolute; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.07);
    animation: ripple 3s ease-out infinite;
  }
  .ring:nth-child(1) { inset: 0; animation-delay: 0s; }
  .ring:nth-child(2) { inset: 16px; animation-delay: 0.8s; }
  .ring:nth-child(3) { inset: 32px; animation-delay: 1.6s; }
  @keyframes ripple {
    0% { transform: scale(0.85); opacity: 0; }
    30% { opacity: 1; }
    100% { transform: scale(1.1); opacity: 0; }
  }

  .play-btn {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    width: 80px; height: 80px; border-radius: 50%; background: #5C6B3A;
    border: none; font-size: 28px; color: white; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s, transform 0.1s;
    box-shadow: 0 0 0 8px rgba(92,107,58,0.15);
  }
  .play-btn:hover { background: #4a5830; }
  .play-btn:active { transform: translate(-50%,-50%) scale(0.94); }

  .track-name { font-size: 24px; margin-bottom: 6px; line-height: 1.2; }
  .track-sub { font-size: 12px; color: #9E9688; margin-bottom: 28px; }

  .progress-bar { width: 100%; max-width: 320px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; margin-bottom: 8px; overflow: hidden; }
  .progress-fill { height: 100%; background: #8FA672; border-radius: 2px; width: 0%; transition: width 0.5s linear; }
  .time-row { display: flex; justify-content: space-between; width: 100%; max-width: 320px; font-size: 11px; color: #9E9688; margin-bottom: 28px; }

  .tags { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
  .tag {
    background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 100px; padding: 5px 13px; font-size: 11px; color: #D4B896;
  }

  .footer { padding: 16px 20px 32px; border-top: 1px solid rgba(255,255,255,0.07); }
  .btn-back {
    width: 100%; padding: 15px; border-radius: 8px;
    border: 1.5px solid rgba(255,255,255,0.15); background: transparent;
    color: #F0E6D6; font-size: 14px; cursor: pointer;
  }
  .btn-back:hover { background: rgba(255,255,255,0.05); }
</style>
</head>
<body>

  <div class="content">
    <div class="rings">
      <div class="ring"></div>
      <div class="ring"></div>
      <div class="ring"></div>
      <button class="play-btn" id="play-btn" onclick="togglePlay()">▶</button>
    </div>

    <div class="track-name" id="track-name">Sons da Floresta Atlântica</div>
    <div class="track-sub" id="track-sub">Ambient Nature · 54 BPM · Sol Maior</div>

    <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
    <div class="time-row">
      <span id="time-cur">0:00</span>
      <span>30:00</span>
    </div>

    <div class="tags" id="tags">
      <span class="tag">Relaxante</span>
      <span class="tag">54 BPM</span>
      <span class="tag">Ambiente</span>
    </div>
  </div>

  <div class="footer">
    <button class="btn-back" onclick="window.location.href='06-resultado.html'">← Voltar às sugestões</button>
  </div>

<script>
  // Carrega dados da trilha selecionada
  const trilha = JSON.parse(sessionStorage.getItem('trilhaSelecionada') || '{}');
  if (trilha.name) {
    document.getElementById('track-name').textContent = trilha.name;
    document.getElementById('track-sub').textContent = trilha.sub;
    if (trilha.tags) {
      document.getElementById('tags').innerHTML = trilha.tags.map(t => `<span class="tag">${t}</span>`).join('');
    }
  }

  let isPlaying = false;
  let seconds = 0;
  let timer = null;
  const TOTAL = 1800; // 30 min

  function togglePlay() {
    isPlaying = !isPlaying;
    document.getElementById('play-btn').textContent = isPlaying ? '⏸' : '▶';
    if (isPlaying) {
      timer = setInterval(() => {
        seconds++;
        const pct = Math.min((seconds / TOTAL) * 100, 100);
        document.getElementById('progress').style.width = pct + '%';
        const m = Math.floor(seconds / 60);
        const s = seconds % 60;
        document.getElementById('time-cur').textContent = `${m}:${s.toString().padStart(2,'0')}`;
        if (seconds >= TOTAL) {
          clearInterval(timer);
          isPlaying = false;
          document.getElementById('play-btn').textContent = '▶';
        }
      }, 1000);
    } else {
      clearInterval(timer);
    }
  }

  // Auto-play ao entrar
  setTimeout(togglePlay, 600);
</script>
</body>
</html>
