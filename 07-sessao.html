<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sessão Ativa — Harmonia do Toque</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a1a; display: flex; justify-content: center;
    align-items: center; min-height: 100vh; font-family: 'Jost', sans-serif;
  }
  .phone {
    width: 390px; height: 844px; border-radius: 44px; overflow: hidden;
    box-shadow: 0 40px 80px rgba(0,0,0,.6), 0 0 0 1px rgba(255,255,255,.08);
    display: flex; flex-direction: column; background: #1a120a;
  }
  .statusbar {
    display: flex; justify-content: space-between;
    padding: 14px 24px 6px; font-size: 12px; font-weight: 500;
    background: #1a120a; color: #9E9688; flex-shrink: 0;
  }

  /* ── CONTENT ── */
  .inner {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 32px 28px; text-align: center; position: relative; overflow: hidden;
  }
  .orb {
    position: absolute; border-radius: 50%; pointer-events: none;
  }
  .orb1 { top:-80px; left:-80px; width:320px; height:320px; background:radial-gradient(circle,rgba(92,107,58,.2) 0%,transparent 70%); }
  .orb2 { bottom:-60px; right:-60px; width:250px; height:250px; background:radial-gradient(circle,rgba(193,123,63,.18) 0%,transparent 70%); }

  .wave-wrap {
    position: relative; width: 140px; height: 140px;
    margin-bottom: 28px; z-index: 1;
  }
  .wave-ring {
    position: absolute; border-radius: 50%;
    border: 1px solid rgba(255,255,255,.08);
    animation: ripple 3s ease-out infinite;
  }
  .wave-ring:nth-child(1) { inset:0; animation-delay:0s; }
  .wave-ring:nth-child(2) { inset:12px; animation-delay:.8s; }
  .wave-ring:nth-child(3) { inset:24px; animation-delay:1.6s; }
  @keyframes ripple {
    0% { transform:scale(.85); opacity:0; }
    30% { opacity:1; }
    100% { transform:scale(1.1); opacity:0; }
  }

  .play-btn {
    position: absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    width: 72px; height: 72px; border-radius: 50%; background: #5C6B3A;
    border: none; font-size: 26px; color: white; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 0 8px rgba(92,107,58,.15);
    transition: background .2s, transform .1s; z-index: 2;
  }
  .play-btn:hover { background: #4a5830; }
  .play-btn:active { transform: translate(-50%,-50%) scale(.94); }

  .track-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px; font-weight: 300; color: #F0E6D6;
    line-height: 1.2; margin-bottom: 6px; z-index: 1;
  }
  .track-sub { font-size: 11px; font-weight: 300; color: #9E9688; margin-bottom: 28px; z-index: 1; }

  .progress-bar {
    width: 100%; height: 3px; background: rgba(255,255,255,.1);
    border-radius: 2px; margin-bottom: 8px; overflow: hidden; z-index: 1;
  }
  .progress-fill { height: 100%; background: #8FA672; border-radius: 2px; width: 0%; transition: width .5s linear; }
  .time-row {
    display: flex; justify-content: space-between; width: 100%;
    font-size: 10px; color: #9E9688; margin-bottom: 28px; z-index: 1;
  }
  .tags { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; z-index: 1; }
  .tag {
    background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.1);
    border-radius: 100px; padding: 5px 13px; font-size: 10px; color: #D4B896; letter-spacing: 1px;
  }

  /* ── FOOTER ── */
  .footer {
    padding: 14px 24px 28px;
    border-top: 1px solid rgba(255,255,255,.07);
    background: #1a120a; flex-shrink: 0;
  }
  .btn-back {
    width: 100%; padding: 15px; border-radius: 100px;
    border: 1.5px solid rgba(255,255,255,.15); background: transparent;
    color: #F0E6D6; font-family: 'Jost', sans-serif;
    font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
    cursor: pointer; transition: background .2s;
  }
  .btn-back:hover { background: rgba(255,255,255,.05); }
</style>
</head>
<body>
<div class="phone">
  <div class="statusbar">
    <span>9:48</span>
    <span style="letter-spacing:2px;">● ● ●</span>
  </div>

  <div class="inner">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>

    <div class="wave-wrap">
      <div class="wave-ring"></div>
      <div class="wave-ring"></div>
      <div class="wave-ring"></div>
      <button class="play-btn" id="play-btn" onclick="togglePlay()">▶</button>
    </div>

    <div class="track-name" id="track-name">Sons da Floresta Atlântica</div>
    <div class="track-sub" id="track-sub">Ambient Nature · 54 BPM · Sol Maior</div>

    <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
    <div class="time-row">
      <span id="time-cur">0:00</span>
      <span>30:00</span>
    </div>

    <div class="tags" id="tags">
      <span class="tag">Relaxante</span>
      <span class="tag">54 BPM</span>
      <span class="tag">Ambiente</span>
    </div>
  </div>

  <div class="footer">
    <button class="btn-back" onclick="window.location.href='06-resultado.html'">← Voltar às sugestões</button>
  </div>
</div>

<script>
  const trilha = JSON.parse(sessionStorage.getItem('trilhaSelecionada') || '{}');
  if (trilha.name) {
    document.getElementById('track-name').textContent = trilha.name;
    document.getElementById('track-sub').textContent = trilha.sub;
    if (trilha.tags)
      document.getElementById('tags').innerHTML = trilha.tags.map(t => `<span class="tag">${t}</span>`).join('');
  }

  let isPlaying = false, seconds = 0, timer = null;
  const TOTAL = 1800;

  function togglePlay() {
    isPlaying = !isPlaying;
    document.getElementById('play-btn').textContent = isPlaying ? '⏸' : '▶';
    if (isPlaying) {
      timer = setInterval(() => {
        seconds++;
        const pct = Math.min((seconds / TOTAL) * 100, 100);
        document.getElementById('progress').style.width = pct + '%';
        const m = Math.floor(seconds / 60);
        const s = seconds % 60;
        document.getElementById('time-cur').textContent = `${m}:${s.toString().padStart(2,'0')}`;
        if (seconds >= TOTAL) { clearInterval(timer); isPlaying = false; document.getElementById('play-btn').textContent = '▶'; }
      }, 1000);
    } else {
      clearInterval(timer);
    }
  }

  setTimeout(togglePlay, 600);
</script>
</body>
</html>
