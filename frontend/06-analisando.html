<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analisando — Harmonia do Toque</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root { --dyn-h:265; --dyn-s:38%; --dyn-l:48%; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0F0D1A; display:flex; justify-content:center; align-items:center; min-height:100vh; font-family:'Jost',sans-serif; }
  .phone {
    width:390px; height:844px; border-radius:44px; overflow:hidden;
    box-shadow:0 40px 80px rgba(0,0,0,0.7),0 0 0 1px rgba(255,255,255,0.07);
    display:flex; flex-direction:column; background:#16132A; position:relative;
  }
  .statusbar { display:flex; justify-content:space-between; padding:14px 24px 6px; font-size:12px; font-weight:500; color:#8B86A3; flex-shrink:0; position:relative; z-index:2; }

  .orb { position:absolute; border-radius:50%; pointer-events:none; }
  .orb1 {
    top:-80px; right:-80px; width:340px; height:340px;
    background:radial-gradient(circle, hsla(var(--dyn-h),var(--dyn-s),60%,0.22) 0%, transparent 70%);
    animation:breathe1 3.5s ease-in-out infinite; z-index:0;
  }
  .orb2 {
    bottom:-60px; left:-60px; width:280px; height:280px;
    background:radial-gradient(circle, hsla(calc(var(--dyn-h) - 20),var(--dyn-s),55%,0.18) 0%, transparent 70%);
    animation:breathe2 4.2s ease-in-out infinite; z-index:0;
  }
  .orb3 {
    top:40%; left:50%; transform:translate(-50%,-50%);
    width:200px; height:200px;
    background:radial-gradient(circle, hsla(calc(var(--dyn-h)+15),var(--dyn-s),65%,0.12) 0%, transparent 70%);
    animation:breathe3 2.8s ease-in-out infinite; z-index:0;
  }
  @keyframes breathe1 { 0%,100%{transform:scale(0.9);opacity:0.7} 50%{transform:scale(1.08);opacity:1} }
  @keyframes breathe2 { 0%,100%{transform:scale(1.05);opacity:0.6} 50%{transform:scale(0.92);opacity:0.9} }
  @keyframes breathe3 { 0%,100%{transform:translate(-50%,-50%) scale(0.88);opacity:0.5} 50%{transform:translate(-50%,-50%) scale(1.12);opacity:0.8} }

  .inner {
    flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:40px 32px; text-align:center; position:relative; z-index:2;
  }
  .loading-icon {
    width:72px; height:72px; border-radius:22px;
    background:hsla(var(--dyn-h),var(--dyn-s),35%,0.8);
    border:1px solid hsla(var(--dyn-h),var(--dyn-s),60%,0.3);
    display:flex; align-items:center; justify-content:center;
    font-size:28px; margin-bottom:24px;
    animation:iconPulse 2.5s ease-in-out infinite;
    transition:background 0.8s ease;
  }
  @keyframes iconPulse {
    0%,100%{transform:scale(1);box-shadow:0 0 0 0 hsla(var(--dyn-h),var(--dyn-s),60%,0.3)}
    50%{transform:scale(1.05);box-shadow:0 0 0 14px hsla(var(--dyn-h),var(--dyn-s),60%,0)}
  }
  .loading-title { font-family:'Cormorant Garamond',serif; font-size:30px; font-weight:300; color:#E8E4F5; line-height:1.2; margin-bottom:10px; }
  .loading-title em { font-style:italic; color:hsl(var(--dyn-h),40%,72%); transition:color 0.8s ease; }
  .loading-sub { font-size:12px; font-weight:300; color:#7B7699; line-height:1.7; margin-bottom:32px; max-width:260px; }

  .bar-wrap { width:100%; margin-bottom:6px; }
  .bar-track { width:100%; height:3px; background:rgba(255,255,255,0.08); border-radius:2px; overflow:hidden; }
  .bar-fill { height:100%; border-radius:2px; width:0%; background:hsl(var(--dyn-h),var(--dyn-s),62%); transition:width 0.5s ease,background 0.8s ease; }
  .bar-pct { font-size:10px; color:#7B7699; text-align:right; margin-top:5px; }

  .steps { width:100%; margin-top:28px; text-align:left; }
  .step {
    display:flex; align-items:center; gap:12px;
    padding:11px 0; border-bottom:1px solid rgba(255,255,255,0.06);
    font-size:12px; font-weight:300; color:rgba(255,255,255,0.25); transition:color 0.4s ease;
  }
  .step:last-child { border-bottom:none; }
  .step-icon { width:18px; text-align:center; font-size:12px; }
  .step.done { color:hsl(var(--dyn-h),35%,65%); }
  .step.running { color:#E8E4F5; font-weight:400; }
</style>
</head>
<body>
<div class="phone">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>

  <div class="statusbar">
    <span>9:46</span>
    <span style="letter-spacing:2px;">● ● ●</span>
  </div>

  <div class="inner">
    <div class="loading-icon">🎵</div>
    <div class="loading-title">Criando sua<br><em>experiência</em></div>
    <div class="loading-sub">A IA está analisando seu perfil e selecionando as músicas ideais para este momento.</div>
    <div class="bar-wrap">
      <div class="bar-track"><div class="bar-fill" id="bar"></div></div>
      <div class="bar-pct"><span id="pct">0%</span></div>
    </div>
    <div class="steps">
      <div class="step" id="s1"><div class="step-icon">○</div><span>Perfil emocional mapeado</span></div>
      <div class="step" id="s2"><div class="step-icon">○</div><span>Preferências musicais analisadas</span></div>
      <div class="step" id="s3"><div class="step-icon">○</div><span>Selecionando repertório...</span></div>
      <div class="step" id="s4"><div class="step-icon">○</div><span>Ajustando BPM e tom</span></div>
    </div>
  </div>
</div>
<script>
  (function init() {
    try {
      const c = JSON.parse(sessionStorage.getItem('appColor') || 'null');
      if (c) {
        document.documentElement.style.setProperty('--dyn-h', c.h);
        document.documentElement.style.setProperty('--dyn-s', c.s + '%');
        document.documentElement.style.setProperty('--dyn-l', c.l + '%');
      }
    } catch(e) {}
  })();

  const STEPS = [
    { id:'s1', pct:25, delay:500 },
    { id:'s2', pct:55, delay:1100 },
    { id:'s3', pct:78, delay:1800 },
    { id:'s4', pct:100, delay:2500 },
  ];
  STEPS.forEach((s, i) => {
    setTimeout(() => {
      if (i > 0) {
        const prev = document.getElementById(STEPS[i-1].id);
        prev.classList.remove('running'); prev.classList.add('done');
        prev.querySelector('.step-icon').textContent = '✓';
      }
      const el = document.getElementById(s.id);
      el.classList.add('running');
      el.querySelector('.step-icon').textContent = '◌';
      document.getElementById('bar').style.width = s.pct + '%';
      document.getElementById('pct').textContent = s.pct + '%';
    }, s.delay);
  });
  setTimeout(() => {
    const last = document.getElementById('s4');
    last.classList.remove('running'); last.classList.add('done');
    last.querySelector('.step-icon').textContent = '✓';
    setTimeout(() => window.location.href = '07-resultado.html', 450);
  }, 3100);
</script>
</body>
</html>
