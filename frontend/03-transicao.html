<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harmonia do Toque</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #0F0D1A;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; font-family: 'Jost', sans-serif;
  }
  .phone {
    width: 390px; height: 844px; border-radius: 44px; overflow: hidden;
    box-shadow: 0 40px 80px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.07);
    display: flex; flex-direction: column; background: #16132A;
    position: relative;
  }
  .statusbar {
    display: flex; justify-content: space-between;
    padding: 14px 24px 6px; font-size: 12px; font-weight: 500;
    color: #8B86A3; flex-shrink: 0; position: relative; z-index: 2;
  }

  /* Orb — starts paused, then breathes */
  .orb-main {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -60%);
    width: 340px; height: 340px;
    border-radius: 50%;
    background: radial-gradient(circle, hsla(265,38%,55%,0.35) 0%, hsla(255,35%,40%,0.15) 50%, transparent 70%);
    animation: breathe 3s ease-in-out infinite;
    z-index: 0;
  }
  @keyframes breathe {
    0%, 100% { transform: translate(-50%, -60%) scale(0.92); opacity: 0.7; }
    50%       { transform: translate(-50%, -60%) scale(1.06); opacity: 1; }
  }

  .orb-secondary {
    position: absolute;
    bottom: -60px; left: -60px;
    width: 260px; height: 260px;
    border-radius: 50%;
    background: radial-gradient(circle, hsla(250,30%,45%,0.2) 0%, transparent 70%);
    animation: breathe-slow 4s ease-in-out infinite;
    z-index: 0;
  }
  @keyframes breathe-slow {
    0%, 100% { transform: scale(0.95) translate(0,0); opacity: 0.6; }
    50%       { transform: scale(1.05) translate(-8px, -8px); opacity: 0.9; }
  }

  /* Content */
  .inner {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 40px 40px; text-align: center;
    position: relative; z-index: 2;
  }

  .line1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 32px; font-weight: 300; color: #E8E4F5;
    line-height: 1.2; opacity: 0;
    animation: fadeUp 0.8s ease 0.3s forwards;
  }
  .line1 em { font-style: italic; color: #B8B0DE; }

  .divider {
    width: 1px; height: 40px;
    background: linear-gradient(to bottom, transparent, rgba(184,176,222,0.4), transparent);
    margin: 24px auto;
    opacity: 0;
    animation: fadeIn 0.6s ease 1.2s forwards;
  }

  .line2 {
    font-size: 13px; font-weight: 300; color: #7B7699;
    line-height: 1.7; max-width: 240px;
    opacity: 0;
    animation: fadeUp 0.8s ease 1.4s forwards;
  }
  .line2 em {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic; color: #B8B0DE; font-size: 16px;
  }

  /* Progress dots at bottom */
  .dots {
    position: absolute; bottom: 36px; left: 0; right: 0;
    display: flex; justify-content: center; gap: 6px;
    z-index: 2;
    opacity: 0;
    animation: fadeIn 0.5s ease 1.8s forwards;
  }
  .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: rgba(184,176,222,0.25);
  }
  .dot.active {
    width: 20px; border-radius: 3px;
    background: rgba(184,176,222,0.6);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
</style>
</head>
<body>
<div class="phone">
  <div class="statusbar">
    <span>9:43</span>
    <span style="letter-spacing:2px;">● ● ●</span>
  </div>

  <div class="orb-main"></div>
  <div class="orb-secondary"></div>

  <div class="inner">
    <div class="line1">Já te conhecemos<br><em>um pouco.</em></div>
    <div class="divider"></div>
    <div class="line2">Agora nos diga —<br><em>como você está hoje?</em></div>
  </div>

  <div class="dots">
    <div class="dot"></div>
    <div class="dot active"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
</div>

<script>
  // Auto-advance after 2.8s
  setTimeout(() => {
    window.location.href = '04-como-voce-esta.html';
  }, 2800);
</script>
</body>
</html>
