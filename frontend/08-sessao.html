<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sessão Ativa — Harmonia do Toque</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root { --dyn-h:265; --dyn-s:38%; --dyn-l:48%; }

  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #0F0D1A;
    display:flex; justify-content:center; align-items:center;
    min-height:100vh; font-family:'Jost',sans-serif;
  }
  .phone {
    width:390px; height:844px; border-radius:44px; overflow:hidden;
    box-shadow:0 40px 80px rgba(0,0,0,0.7),0 0 0 1px rgba(255,255,255,0.07);
    display:flex; flex-direction:column;
    background: #0E0C1B;
    position:relative;
  }
  .statusbar {
    display:flex; justify-content:space-between; padding:14px 24px 6px;
    font-size:12px; font-weight:500; color:#8B86A3;
    flex-shrink:0; position:relative; z-index:2;
  }

  /* ── AMBIENTE — orbs vivos com a cor final, respirando bem devagar ── */
  .orb { position:absolute; border-radius:50%; pointer-events:none; }
  .orb1 {
    top:-100px; left:-100px; width:380px; height:380px;
    background:radial-gradient(circle,
      hsla(var(--dyn-h),var(--dyn-s),48%,0.26) 0%, transparent 70%);
    animation:driftA 9s ease-in-out infinite;
    z-index:0;
  }
  .orb2 {
    bottom:-90px; right:-80px; width:320px; height:320px;
    background:radial-gradient(circle,
      hsla(calc(var(--dyn-h) - 16),var(--dyn-s),42%,0.22) 0%, transparent 70%);
    animation:driftB 11s ease-in-out infinite;
    z-index:0;
  }
  .orb3 {
    top:30%; right:10%; width:180px; height:180px;
    background:radial-gradient(circle,
      hsla(calc(var(--dyn-h) + 12),var(--dyn-s),58%,0.14) 0%, transparent 70%);
    animation:driftC 7s ease-in-out infinite;
    z-index:0;
  }
  @keyframes driftA {
    0%,100% { transform:scale(0.95) translate(0,0); opacity:0.7; }
    50%      { transform:scale(1.08) translate(12px,8px); opacity:1; }
  }
  @keyframes driftB {
    0%,100% { transform:scale(1.04) translate(0,0); opacity:0.6; }
    50%      { transform:scale(0.93) translate(-10px,-6px); opacity:0.85; }
  }
  @keyframes driftC {
    0%,100% { transform:scale(0.9); opacity:0.4; }
    50%      { transform:scale(1.1); opacity:0.7; }
  }

  /* ── CONTEÚDO ── */
  .inner {
    flex:1; display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    padding:32px 28px; text-align:center; position:relative; z-index:2;
  }

  /* Ondas concêntricas ao redor do play */
  .wave-wrap { position:relative; width:150px; height:150px; margin-bottom:30px; }
  .wave-ring {
    position:absolute; border-radius:50%;
    border:1px solid hsla(var(--dyn-h),var(--dyn-s),65%,0.18);
    animation:ripple 3.2s ease-out infinite;
    transition:border-color 0.8s ease;
  }
  .wave-ring:nth-child(1) { inset:0;    animation-delay:0s; }
  .wave-ring:nth-child(2) { inset:14px; animation-delay:0.9s; }
  .wave-ring:nth-child(3) { inset:28px; animation-delay:1.8s; }
  @keyframes ripple {
    0%   { transform:scale(0.85); opacity:0; }
    30%  { opacity:1; }
    100% { transform:scale(1.12); opacity:0; }
  }
  .wave-ring.paused { animation-play-state: paused; opacity: 0.15; }

  .play-btn {
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    width:76px; height:76px; border-radius:50%;
    background:hsl(var(--dyn-h),38%,40%);
    border:none; font-size:26px; color:#F4F1FB; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 0 0 9px hsla(var(--dyn-h),var(--dyn-s),55%,0.13);
    transition:background 0.8s ease, transform 0.15s ease;
    z-index:2;
  }
  .play-btn:hover { filter:brightness(1.1); }
  .play-btn:active { transform:translate(-50%,-50%) scale(0.94); }

  .track-name {
    font-family:'Cormorant Garamond',serif;
    font-size:26px; font-weight:300; color:#E8E4F5;
    line-height:1.2; margin-bottom:6px;
  }
  .track-sub { font-size:11px; font-weight:300; color:#7B7699; margin-bottom:30px; }

  /* Barra de progresso */
  .progress-bar {
    width:100%; height:3px; background:rgba(255,255,255,0.08);
    border-radius:2px; margin-bottom:8px; overflow:hidden;
  }
  .progress-fill {
    height:100%; border-radius:2px; width:0%;
    background:hsl(var(--dyn-h),35%,68%);
    transition:width 0.5s linear, background 0.8s ease;
  }
  .time-row {
    display:flex; justify-content:space-between; width:100%;
    font-size:10px; color:#7B7699; margin-bottom:30px;
  }

  .tags { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin-bottom: 8px; }
  .tag {
    background:hsla(var(--dyn-h),var(--dyn-s),50%,0.12);
    border:1px solid hsla(var(--dyn-h),var(--dyn-s),60%,0.25);
    border-radius:100px; padding:5px 13px; font-size:10px;
    color:hsl(var(--dyn-h),35%,75%); letter-spacing:1px;
    transition:background 0.8s ease, border-color 0.8s ease, color 0.8s ease;
  }

  /* Mensagem de encerramento (aparece quando termina) */
  .end-msg {
    font-size:11px; font-weight:300; color:#7B7699;
    margin-top:18px; max-width:240px; line-height:1.6;
    opacity:0; transition:opacity 0.6s ease;
  }
  .end-msg.show { opacity:1; }
  .end-msg em { font-style:italic; color:hsl(var(--dyn-h),35%,72%); }

  /* ── FOOTER ── */
  .footer {
    padding:14px 24px 28px;
    border-top:1px solid rgba(255,255,255,0.06);
    background:transparent; flex-shrink:0; position:relative; z-index:2;
  }
  .btn-back {
    width:100%; padding:15px; border-radius:100px;
    border:1.5px solid rgba(255,255,255,0.12); background:transparent;
    color:#E8E4F5; font-family:'Jost',sans-serif;
    font-size:11px; letter-spacing:2px; text-transform:uppercase;
    cursor:pointer; transition:background 0.2s, border-color 0.8s;
  }
  .btn-back:hover { background:rgba(255,255,255,0.05); }
  .restart-link {
    text-align:center; font-size:10px; color:#5E5A78; margin-top:12px;
  }
  .restart-link a { color: hsl(var(--dyn-h),30%,55%); text-decoration:none; transition: color 0.8s; }
</style>
</head>
<body>
<div class="phone">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>

  <div class="statusbar">
    <span>9:48</span>
    <span style="letter-spacing:2px;">● ● ●</span>
  </div>

  <div class="inner">
    <div class="wave-wrap">
      <div class="wave-ring" id="ring1"></div>
      <div class="wave-ring" id="ring2"></div>
      <div class="wave-ring" id="ring3"></div>
      <button class="play-btn" id="play-btn" onclick="togglePlay()">▶</button>
    </div>

    <div class="track-name" id="track-name">Sons da Floresta Atlântica</div>
    <div class="track-sub" id="track-sub">Ambient Nature · 54 BPM · Sol Maior</div>

    <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
    <div class="time-row">
      <span id="time-cur">0:00</span>
      <span id="time-total">30:00</span>
    </div>

    <div class="tags" id="tags">
      <span class="tag">Relaxante</span>
      <span class="tag">54 BPM</span>
      <span class="tag">Ambiente</span>
    </div>

    <div class="end-msg" id="end-msg">Sessão concluída. <em>Esperamos que se sinta renovado.</em></div>
  </div>

  <div class="footer">
    <button class="btn-back" onclick="window.location.href='07-resultado.html'">← Voltar às sugestões</button>
    <div class="restart-link">Encerrar e <a href="01-splash.html">iniciar nova sessão</a></div>
  </div>
</div>

<script>
  /* ── Aplica a cor final acumulada — o "ambiente" da sessão ── */
  (function init() {
    try {
      const c = JSON.parse(sessionStorage.getItem('appColor') || 'null');
      if (c) {
        document.documentElement.style.setProperty('--dyn-h', c.h);
        document.documentElement.style.setProperty('--dyn-s', c.s + '%');
        document.documentElement.style.setProperty('--dyn-l', c.l + '%');
      }
    } catch(e) {}
  })();

  /* ── Carrega a trilha selecionada na tela de resultado ── */
  (function loadTrack() {
    try {
      const t = JSON.parse(sessionStorage.getItem('trilhaSelecionada') || 'null');
      if (t && t.name) {
        document.getElementById('track-name').textContent = t.name;
        document.getElementById('track-sub').textContent = t.sub;
        if (t.tags) {
          document.getElementById('tags').innerHTML =
            t.tags.map(tag => `<span class="tag">${tag}</span>`).join('');
        }
      }
    } catch(e) {}
  })();

  let isPlaying = false;
  let seconds = 0;
  let timer = null;
  const TOTAL = 1800; // 30 minutos

  function formatTime(s) {
    const m = Math.floor(s / 60);
    const sec = s % 60;
    return `${m}:${sec.toString().padStart(2,'0')}`;
  }

  function togglePlay() {
    isPlaying = !isPlaying;
    document.getElementById('play-btn').textContent = isPlaying ? '⏸' : '▶';

    // Pausa/retoma a animação das ondas
    ['ring1','ring2','ring3'].forEach(id => {
      document.getElementById(id).classList.toggle('paused', !isPlaying);
    });

    if (isPlaying) {
      document.getElementById('end-msg').classList.remove('show');
      timer = setInterval(() => {
        seconds++;
        const pct = Math.min((seconds / TOTAL) * 100, 100);
        document.getElementById('progress').style.width = pct + '%';
        document.getElementById('time-cur').textContent = formatTime(seconds);

        if (seconds >= TOTAL) {
          clearInterval(timer);
          isPlaying = false;
          document.getElementById('play-btn').textContent = '▶';
          document.getElementById('end-msg').classList.add('show');
        }
      }, 1000);
    } else {
      clearInterval(timer);
    }
  }

  // Auto-play suave ao entrar na tela
  setTimeout(togglePlay, 700);
</script>
</body>
</html>
