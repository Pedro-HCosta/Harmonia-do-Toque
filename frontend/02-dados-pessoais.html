<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dados Pessoais — Harmonia do Toque</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #0F0D1A;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; font-family: 'Jost', sans-serif;
  }
  .phone {
    width: 390px; height: 844px; border-radius: 44px; overflow: hidden;
    box-shadow: 0 40px 80px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.07);
    display: flex; flex-direction: column; background: #F4F1FB;
  }
  .statusbar {
    display: flex; justify-content: space-between;
    padding: 14px 24px 6px; font-size: 12px; font-weight: 500;
    background: #F4F1FB; color: #5A5490; flex-shrink: 0;
  }

  /* Orbs - static violet, no reactions yet */
  .orb-wrap {
    position: absolute; inset: 0; pointer-events: none; overflow: hidden; border-radius: 44px;
  }
  .orb {
    position: absolute; border-radius: 50%;
  }
  .orb1 {
    top: -80px; right: -80px; width: 280px; height: 280px;
    background: radial-gradient(circle, hsla(265,38%,78%,0.22) 0%, transparent 70%);
  }
  .orb2 {
    bottom: -60px; left: -60px; width: 260px; height: 260px;
    background: radial-gradient(circle, hsla(250,35%,75%,0.14) 0%, transparent 70%);
  }

  .app-header {
    background: transparent; padding: 14px 24px 12px;
    border-bottom: 1px solid #D0CAED; flex-shrink: 0; position: relative; z-index: 1;
  }
  .back {
    font-size: 12px; color: #7B75B5; text-decoration: none;
    display: flex; align-items: center; gap: 4px; margin-bottom: 12px;
  }
  .progress { display: flex; gap: 5px; }
  .prog-dot { height: 4px; flex: 1; border-radius: 2px; }
  .p-done { background: #7B75B5; }
  .p-active { background: #4A4380; }
  .p-todo { background: #D0CAED; }
  .prog-label { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: #AAA6C3; margin-top: 7px; }

  .scroll {
    flex: 1; overflow-y: auto; padding: 22px 24px 16px;
    position: relative; z-index: 1;
  }
  .scroll::-webkit-scrollbar { display: none; }

  .screen-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px; font-weight: 400; color: #2D2A4A; margin-bottom: 6px;
  }
  .screen-sub { font-size: 12px; font-weight: 300; color: #7B7699; line-height: 1.6; margin-bottom: 22px; }

  label {
    display: block; font-size: 10px; font-weight: 500;
    letter-spacing: 2px; text-transform: uppercase;
    color: #8B7DC0; margin-bottom: 7px; margin-top: 16px;
  }
  label:first-of-type { margin-top: 0; }
  input, select {
    width: 100%; padding: 12px 15px; border: 1.5px solid #D0CAED;
    border-radius: 10px; font-family: 'Jost', sans-serif; font-size: 14px;
    font-weight: 300; color: #2D2A4A; background: white; outline: none;
    -webkit-appearance: none; transition: border-color 0.2s;
  }
  input:focus, select:focus { border-color: #7B75B5; box-shadow: 0 0 0 3px rgba(123,117,181,0.12); }
  input.error { border-color: #c0392b; }
  input::placeholder, select::placeholder { color: #AAA6C3; }
  .field-row { display: flex; gap: 10px; margin-top: 16px; }
  .field-row > div { flex: 1; }
  .field-row label { margin-top: 0; }
  .error-msg { font-size: 10px; color: #c0392b; margin-top: 4px; display: none; }

  .toggle-row { display: flex; gap: 8px; margin-top: 2px; }
  .toggle-btn {
    flex: 1; padding: 11px; border-radius: 10px; border: 1.5px solid #D0CAED;
    font-family: 'Jost', sans-serif; font-size: 12px;
    cursor: pointer; background: white; color: #AAA6C3; transition: all 0.2s;
  }
  .toggle-btn.selected { background: #4A4380; color: #F0EDF9; border-color: #4A4380; }

  .footer {
    padding: 14px 24px 28px; border-top: 1px solid #D0CAED;
    background: #F4F1FB; flex-shrink: 0; position: relative; z-index: 1;
  }
  .btn-primary {
    width: 100%; padding: 16px; border-radius: 100px; border: none;
    background: #4A4380; color: #F0EDF9; font-family: 'Jost', sans-serif;
    font-size: 12px; letter-spacing: 2.5px; text-transform: uppercase;
    cursor: pointer; transition: background 0.2s;
  }
  .btn-primary:hover { background: #3A3470; }
</style>
</head>
<body>
<div class="phone">
  <div style="position:absolute;inset:0;pointer-events:none;overflow:hidden;border-radius:44px;z-index:0;">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
  </div>

  <div class="statusbar">
    <span>9:42</span>
    <span style="letter-spacing:2px;">● ● ●</span>
  </div>

  <div class="app-header">
    <a href="01-splash.html" class="back">← Voltar</a>
    <div class="progress">
      <div class="prog-dot p-active"></div>
      <div class="prog-dot p-todo"></div>
      <div class="prog-dot p-todo"></div>
      <div class="prog-dot p-todo"></div>
    </div>
    <div class="prog-label">Etapa 1 de 4 — Seus dados</div>
  </div>

  <div class="scroll">
    <div class="screen-title">Olá, bem-vindo!</div>
    <div class="screen-sub">Nos conte um pouco sobre você para personalizarmos sua experiência.</div>

    <label>Nome completo *</label>
    <input type="text" id="nome" placeholder="Ex: Maria Silva">
    <div class="error-msg" id="err-nome">Por favor, insira seu nome.</div>

    <div class="field-row">
      <div>
        <label>Idade</label>
        <input type="number" id="idade" placeholder="Ex: 32" min="1" max="120">
      </div>
      <div>
        <label>Sexo</label>
        <select id="sexo">
          <option value="">Selecione</option>
          <option>Feminino</option>
          <option>Masculino</option>
          <option>Prefiro não dizer</option>
        </select>
      </div>
    </div>

    <label>Profissão</label>
    <input type="text" id="profissao" placeholder="Ex: Professora, Designer...">

    <label>Primeira vez aqui?</label>
    <div class="toggle-row">
      <button class="toggle-btn selected" id="tog-sim" onclick="selectToggle('sim')">Sim, primeira vez</button>
      <button class="toggle-btn" id="tog-nao" onclick="selectToggle('nao')">Já vim antes</button>
    </div>
  </div>

  <div class="footer">
    <button class="btn-primary" onclick="avancar()">Continuar →</button>
  </div>
</div>

<script>
  function selectToggle(val) {
    document.getElementById('tog-sim').classList.toggle('selected', val === 'sim');
    document.getElementById('tog-nao').classList.toggle('selected', val === 'nao');
    sessionStorage.setItem('primeiraVez', val);
  }
  function avancar() {
    const nome = document.getElementById('nome').value.trim();
    if (!nome) {
      document.getElementById('nome').classList.add('error');
      document.getElementById('err-nome').style.display = 'block';
      document.getElementById('nome').focus();
      return;
    }
    sessionStorage.setItem('nome', nome);
    sessionStorage.setItem('idade', document.getElementById('idade').value);
    sessionStorage.setItem('sexo', document.getElementById('sexo').value);
    sessionStorage.setItem('profissao', document.getElementById('profissao').value);
    // Reset color to base before transition
    sessionStorage.removeItem('appColor');
    sessionStorage.removeItem('humorColor');
    window.location.href = '03-transicao.html';
  }
  document.getElementById('nome').addEventListener('input', function() {
    this.classList.remove('error');
    document.getElementById('err-nome').style.display = 'none';
  });
</script>
</body>
</html>
