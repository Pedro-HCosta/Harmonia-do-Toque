<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harmonia do Toque</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #0F0D1A;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; font-family: 'Jost', sans-serif;
  }
  .phone {
    width: 390px; height: 844px; border-radius: 44px; overflow: hidden;
    box-shadow: 0 40px 80px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.07);
    display: flex; flex-direction: column; background: #16132A;
  }
  .statusbar {
    display: flex; justify-content: space-between;
    padding: 14px 24px 6px; font-size: 12px; font-weight: 500;
    color: #8B86A3; flex-shrink: 0;
  }
  .inner {
    flex: 1; display: flex; flex-direction: column;
    padding: 28px 32px 40px; position: relative; overflow: hidden;
  }

  /* Orbs — static, violet base */
  .orb {
    position: absolute; border-radius: 50%; pointer-events: none;
  }
  .orb1 {
    top: -60px; right: -60px; width: 280px; height: 280px;
    background: radial-gradient(circle, hsla(265,38%,48%,0.28) 0%, transparent 70%);
  }
  .orb2 {
    bottom: 80px; left: -80px; width: 300px; height: 300px;
    background: radial-gradient(circle, hsla(250,35%,40%,0.18) 0%, transparent 70%);
  }
  .orb3 {
    top: 38%; right: -20px; width: 160px; height: 160px;
    background: radial-gradient(circle, hsla(275,30%,55%,0.12) 0%, transparent 70%);
  }

  .app-icon {
    width: 52px; height: 52px;
    background: rgba(123,111,184,0.2); border: 1px solid rgba(123,111,184,0.3);
    border-radius: 16px; display: flex; align-items: center; justify-content: center;
    font-size: 22px; margin-bottom: 28px; position: relative; z-index: 1;
  }
  .tag {
    font-size: 10px; letter-spacing: 4px; text-transform: uppercase;
    color: #7B75B5; margin-bottom: 10px; position: relative; z-index: 1;
  }
  .title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 52px; font-weight: 300; line-height: 1.05;
    color: #E8E4F5; position: relative; z-index: 1;
  }
  .title em { font-style: italic; color: #B8B0DE; }
  .desc {
    font-size: 13px; font-weight: 300; color: #7B7699;
    line-height: 1.7; margin-top: 16px; max-width: 260px;
    position: relative; z-index: 1;
  }
  .pills {
    display: flex; gap: 8px; margin-top: 20px; flex-wrap: wrap;
    position: relative; z-index: 1;
  }
  .pill {
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 100px; padding: 5px 13px;
    font-size: 10px; color: #B8B0DE; letter-spacing: 1px;
  }
  .spacer { flex: 1; }
  .btn-main {
    width: 100%; padding: 17px; border-radius: 100px; border: none;
    background: #5B5490; color: #F0EDF9;
    font-family: 'Jost', sans-serif; font-size: 12px;
    letter-spacing: 2.5px; text-transform: uppercase;
    cursor: pointer; text-align: center; text-decoration: none;
    display: block; position: relative; z-index: 1;
    transition: background 0.2s;
  }
  .btn-main:hover { background: #4A4380; }
  .link {
    text-align: center; font-size: 12px; font-weight: 300;
    color: #7B7699; margin-top: 14px; cursor: pointer;
    position: relative; z-index: 1;
  }
  .link span { color: #B8B0DE; text-decoration: underline; }
</style>
</head>
<body>
<div class="phone">
  <div class="statusbar">
    <span>9:41</span>
    <span style="letter-spacing:2px;">● ● ●</span>
  </div>
  <div class="inner">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
    <div class="app-icon">🌙</div>
    <div class="tag">Musicoterapia aplicada</div>
    <div class="title">Harmonia<br><em>do Toque</em></div>
    <div class="desc">Música personalizada com IA para cada momento da sua sessão de bem-estar.</div>
    <div class="pills">
      <span class="pill">Bem-estar</span>
      <span class="pill">Personalizado</span>
      <span class="pill">IA</span>
    </div>
    <div class="spacer"></div>
    <a href="02-dados-pessoais.html" class="btn-main">Iniciar sessão</a>
    <div class="link">Já tenho conta — <span>entrar</span></div>
  </div>
</div>
</body>
</html>
