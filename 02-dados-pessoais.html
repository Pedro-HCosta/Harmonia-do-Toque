<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dados Pessoais — Harmonia do Toque</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a1a; display: flex; justify-content: center;
    align-items: center; min-height: 100vh; font-family: 'Jost', sans-serif;
  }

  /* ── SHELL ── */
  .phone {
    width: 390px; height: 844px; border-radius: 44px; overflow: hidden;
    box-shadow: 0 40px 80px rgba(0,0,0,.6), 0 0 0 1px rgba(255,255,255,.08);
    display: flex; flex-direction: column; background: #FAF6EF;
  }
  .statusbar {
    display: flex; justify-content: space-between;
    padding: 14px 24px 6px; font-size: 12px; font-weight: 500;
    background: #FAF6EF; color: #6B4C30; flex-shrink: 0;
  }

  /* ── HEADER ── */
  .app-header {
    background: #FAF6EF; padding: 14px 24px 12px;
    border-bottom: 1px solid #F0E6D6; flex-shrink: 0;
  }
  .back {
    font-size: 12px; color: #A0714F; text-decoration: none;
    display: flex; align-items: center; gap: 4px; margin-bottom: 12px;
  }
  .progress { display: flex; gap: 5px; }
  .prog-dot { height: 4px; flex: 1; border-radius: 2px; }
  .p-done { background: #5C6B3A; }
  .p-active { background: #3B2A1A; }
  .p-todo { background: #F0E6D6; }
  .prog-label { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: #B8B0A6; margin-top: 7px; }

  /* ── SCROLL ── */
  .scroll { flex: 1; overflow-y: auto; padding: 22px 24px 16px; }
  .scroll::-webkit-scrollbar { display: none; }

  .screen-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px; font-weight: 400; color: #3B2A1A; margin-bottom: 6px;
  }
  .screen-sub { font-size: 12px; font-weight: 300; color: #9E9688; line-height: 1.6; margin-bottom: 22px; }

  label {
    display: block; font-size: 10px; font-weight: 500;
    letter-spacing: 2px; text-transform: uppercase;
    color: #A0714F; margin-bottom: 7px; margin-top: 16px;
  }
  label:first-of-type { margin-top: 0; }
  input, select {
    width: 100%; padding: 12px 15px; border: 1.5px solid #D4B896;
    border-radius: 10px; font-family: 'Jost', sans-serif; font-size: 14px;
    font-weight: 300; color: #3B2A1A; background: white; outline: none;
    -webkit-appearance: none; transition: border-color .2s;
  }
  input:focus, select:focus { border-color: #6B4C30; }
  input.error { border-color: #c0392b; }
  input::placeholder { color: #B8B0A6; }
  .field-row { display: flex; gap: 10px; }
  .field-row > div { flex: 1; }
  .error-msg { font-size: 10px; color: #c0392b; margin-top: 4px; display: none; }

  .toggle-row { display: flex; gap: 8px; margin-top: 2px; }
  .toggle-btn {
    flex: 1; padding: 11px; border-radius: 10px; border: 1.5px solid #D4B896;
    font-family: 'Jost', sans-serif; font-size: 12px; cursor: pointer;
    background: white; color: #9E9688; transition: all .2s;
  }
  .toggle-btn.selected { background: #3B2A1A; color: #F0E6D6; border-color: #3B2A1A; }

  /* ── FOOTER ── */
  .footer {
    padding: 14px 24px 28px; border-top: 1px solid #F0E6D6;
    background: #FAF6EF; flex-shrink: 0;
  }
  .btn-primary {
    width: 100%; padding: 16px; border-radius: 100px; border: none;
    background: #3B2A1A; color: #F0E6D6; font-family: 'Jost', sans-serif;
    font-size: 12px; letter-spacing: 2.5px; text-transform: uppercase;
    cursor: pointer; transition: background .2s;
  }
  .btn-primary:hover { background: #2a1d0f; }
</style>
</head>
<body>
<div class="phone">
  <div class="statusbar">
    <span>9:42</span>
    <span style="letter-spacing:2px;">● ● ●</span>
  </div>

  <div class="app-header">
    <a href="01-splash.html" class="back">← Voltar</a>
    <div class="progress">
      <div class="prog-dot p-active"></div>
      <div class="prog-dot p-todo"></div>
      <div class="prog-dot p-todo"></div>
      <div class="prog-dot p-todo"></div>
    </div>
    <div class="prog-label">Etapa 1 de 4 — Seus dados</div>
  </div>

  <div class="scroll">
    <div class="screen-title">Olá, bem-vindo!</div>
    <div class="screen-sub">Nos conte um pouco sobre você para personalizarmos sua experiência.</div>

    <label>Nome completo *</label>
    <input type="text" id="nome" placeholder="Ex: Maria Silva">
    <div class="error-msg" id="err-nome">Por favor, insira seu nome.</div>

    <div class="field-row" style="margin-top:16px;">
      <div>
        <label>Idade</label>
        <input type="number" id="idade" placeholder="Ex: 32" min="1" max="120">
      </div>
      <div>
        <label>Sexo</label>
        <select id="sexo">
          <option value="">Selecione</option>
          <option>Feminino</option>
          <option>Masculino</option>
          <option>Prefiro não dizer</option>
        </select>
      </div>
    </div>

    <label>Profissão</label>
    <input type="text" id="profissao" placeholder="Ex: Professora, Designer...">

    <label>Primeira vez aqui?</label>
    <div class="toggle-row">
      <button class="toggle-btn selected" id="tog-sim" onclick="selectToggle('sim')">Sim, primeira vez</button>
      <button class="toggle-btn" id="tog-nao" onclick="selectToggle('nao')">Já vim antes</button>
    </div>
  </div>

  <div class="footer">
    <button class="btn-primary" onclick="avancar()">Continuar →</button>
  </div>
</div>

<script>
  function selectToggle(val) {
    document.getElementById('tog-sim').classList.toggle('selected', val === 'sim');
    document.getElementById('tog-nao').classList.toggle('selected', val === 'nao');
    sessionStorage.setItem('primeiraVez', val);
  }
  function avancar() {
    const nome = document.getElementById('nome').value.trim();
    if (!nome) {
      document.getElementById('nome').classList.add('error');
      document.getElementById('err-nome').style.display = 'block';
      document.getElementById('nome').focus();
      return;
    }
    sessionStorage.setItem('nome', nome);
    sessionStorage.setItem('idade', document.getElementById('idade').value);
    sessionStorage.setItem('sexo', document.getElementById('sexo').value);
    sessionStorage.setItem('profissao', document.getElementById('profissao').value);
    window.location.href = '03-como-voce-esta.html';
  }
  document.getElementById('nome').addEventListener('input', function() {
    this.classList.remove('error');
    document.getElementById('err-nome').style.display = 'none';
  });
</script>
</body>
</html>
